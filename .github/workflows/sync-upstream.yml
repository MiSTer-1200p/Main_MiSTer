name: Sync from Upstreams

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync-master:
    uses: ./.github/workflows/sync-branch.yml
    with:
      branch: master
      upstream_repo: https://github.com/MiSTer-devel/Main_MiSTer.git
      upstream_ref: master
      upstream_db_url: https://raw.githubusercontent.com/MiSTer-devel/Distribution_MiSTer/main/db.json.zip
      upstream_db_name: db.json
    secrets: inherit

  sync-db9:
    uses: ./.github/workflows/sync-branch.yml
    with:
      branch: db9
      upstream_repo: https://github.com/MiSTer-DB9/Main_MiSTer.git
      upstream_ref: master
      upstream_db_url: https://raw.githubusercontent.com/MiSTer-DB9/Distribution_MiSTer/main/dbencc.json.zip
      upstream_db_name: dbencc.json
    secrets: inherit

  sync-aitorgomez:
    uses: ./.github/workflows/sync-branch.yml
    with:
      branch: aitorgomez
      upstream_repo: https://github.com/spark2k06/Main_MiSTer.git
      upstream_ref: master
      upstream_db_url: https://raw.githubusercontent.com/MiSTer-devel/Distribution_MiSTer/main/db.json.zip
      upstream_db_name: db.json
    secrets: inherit

  sync-full:
    runs-on: ubuntu-latest
    needs: [sync-master, sync-db9, sync-aitorgomez]
    if: always() && !cancelled()
    outputs:
      has_release_changes: ${{ steps.check_releases.outputs.has_release_changes }}
      release_name: ${{ steps.check_releases.outputs.release_name }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: full
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch synced branches
        run: git fetch origin master db9 aitorgomez

      - name: Save pre-sync HEAD
        run: echo "PRE_SYNC=$(git rev-parse HEAD)" >> $GITHUB_ENV

      - name: Rebuild full from synced branches
        run: |
          resolve_conflicts() {
            local label="$1"
            local unmerged

            unmerged=$(git diff --name-only --diff-filter=U)
            if [ -z "$unmerged" ]; then
              echo "::error::${label}: merge failed without conflicts to resolve"
              return 1
            fi

            while IFS= read -r path; do
              [ -n "$path" ] || continue
              git rm --ignore-unmatch -q -- "$path"
            done <<<"$unmerged"
          }

          # Start fresh from master each sync to avoid accumulated-state issues
          # where a previous merge's conflict resolution masks new upstream changes.
          git reset --hard origin/master

          # Merge db9 (DB9 joystick/SNAC support). Since db9 is rebased on
          # master this is usually conflict-free.
          if ! git merge origin/db9 --no-edit --allow-unrelated-histories; then
            resolve_conflicts "Merge db9" || { git merge --abort; exit 1; }
            git commit --no-edit
          fi

          # Merge aitorgomez with -X ours so master+db9 wins any conflicts.
          # Aitorgomez's new files (loadscreen.cpp, zaparoo.cpp, etc.) are
          # always included cleanly since new files never conflict. Files that
          # aitorgomez modifies but is behind master on (e.g. video.h missing
          # video_mode_cmd) keep the master/db9 version, preventing build
          # failures. The "Restore own files" step then overlays the files
          # where we specifically need aitorgomez content (cfg.h, menu.cpp…).
          if ! git merge origin/aitorgomez --no-edit --allow-unrelated-histories -X ours; then
            resolve_conflicts "Merge aitorgomez" || { git merge --abort; exit 1; }
            git commit --no-edit
          fi

      - name: Check for release changes
        id: check_releases
        run: |
          CHANGED=$(git diff --no-renames --diff-filter=A --name-only $PRE_SYNC HEAD -- releases/)
          if [ -n "$CHANGED" ]; then
            echo "has_release_changes=true" >> $GITHUB_OUTPUT
            LATEST=$(echo "$CHANGED" | sort | tail -1 | xargs basename)
            echo "release_name=$LATEST" >> $GITHUB_OUTPUT
            echo "Release changes detected: $LATEST"
          else
            echo "has_release_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Restore own files
        run: |
          CHANGED=0

          # Source files that combine changes from both db9 and aitorgomez in
          # ways that cannot be resolved automatically by git merge. These are
          # maintained manually on the full branch and must be preserved after
          # each sync to avoid build failures.
          for f in README.md cfg.h cfg.cpp menu.cpp user_io.cpp video.h; do
            if ! git diff --quiet $PRE_SYNC HEAD -- "$f"; then
              if git cat-file -e $PRE_SYNC:"$f" 2>/dev/null; then
                git checkout $PRE_SYNC -- "$f"
                git add "$f"
              else
                git rm --ignore-unmatch "$f"
              fi
              CHANGED=1
            fi
          done

          # Restore releases/ to pre-sync state (keep our compiled binaries,
          # discard upstream binaries that came in via the merge).
          if ! git diff --quiet $PRE_SYNC HEAD -- releases/; then
            git diff --no-renames --name-only $PRE_SYNC HEAD -- releases/ | while read -r f; do
              [ -n "$f" ] || continue
              if git cat-file -e "$PRE_SYNC:$f" 2>/dev/null; then
                git checkout "$PRE_SYNC" -- "$f"
              else
                git rm --ignore-unmatch -q "$f"
              fi
            done
            git add releases/ 2>/dev/null || true
            CHANGED=1
          fi

          [ $CHANGED -eq 1 ] && git commit -m "Restore own files from full branch" || true

      - name: Restore .github
        run: |
          restore_build_feature_only() {
            local ref="$1"
            local build_feature=".github/workflows/build-feature.yml"
            local tracked
            local path

            if ! git cat-file -e "$ref:$build_feature" 2>/dev/null; then
              echo "::error::Pre-sync branch is missing $build_feature"
              return 1
            fi

            git checkout "$ref" -- "$build_feature"
            git add "$build_feature"

            tracked=$(git ls-files .github)
            while IFS= read -r path; do
              [ -n "$path" ] || continue
              if [ "$path" != "$build_feature" ]; then
                git rm --ignore-unmatch -q -- "$path"
              fi
            done <<<"$tracked"

            if ! git diff --cached --quiet -- .github/; then
              git commit -m "Restrict .github to build-feature.yml"
            fi
          }

          restore_build_feature_only "$PRE_SYNC"

      - name: Push
        run: git push origin full --force-with-lease

      - name: Update distribution database
        if: steps.check_releases.outputs.has_release_changes != 'true'
        run: |
          BRANCH="full"
          DB_BRANCH="db/${BRANCH}"
          LATEST_RELEASE=$(ls -1 releases/MiSTer_* 2>/dev/null | sort | tail -1)
          if [ -z "$LATEST_RELEASE" ]; then
            echo "No releases found, skipping db update"
            exit 0
          fi
          RELEASE_NAME=$(basename "$LATEST_RELEASE")
          HASH=$(md5sum "$LATEST_RELEASE" | cut -d' ' -f1)
          SIZE=$(stat -c%s "$LATEST_RELEASE")
          TIMESTAMP=$(date +%s)
          BINARY_URL="https://raw.githubusercontent.com/${{ github.repository }}/${BRANCH}/releases/${RELEASE_NAME}"
          UPSTREAM_DB_URL="https://raw.githubusercontent.com/MiSTer-DB9/Distribution_MiSTer/main/dbencc.json.zip"

          curl -sL "$UPSTREAM_DB_URL" -o /tmp/upstream_db.zip
          cd /tmp && unzip -o upstream_db.zip && cd -

          python3 -c "
          import json
          with open('/tmp/dbencc.json') as f:
              db = json.load(f)
          db['timestamp'] = ${TIMESTAMP}
          db['files']['MiSTer'] = {
              'hash': '${HASH}',
              'size': ${SIZE},
              'url': '${BINARY_URL}',
              'path': 'system',
              'reboot': True,
              'tags': db['files'].get('MiSTer', {}).get('tags', []),
              'backup': '.MiSTer.old',
              'tmp': 'MiSTer.new'
          }
          with open('/tmp/db.json', 'w') as f:
              json.dump(db, f, separators=(',', ':'))
          "

          cd /tmp && zip -9 db.json.zip db.json && cd -

          git checkout --orphan "${DB_BRANCH}" 2>/dev/null || git checkout "${DB_BRANCH}" 2>/dev/null || git checkout --orphan "${DB_BRANCH}"
          git rm -rf . 2>/dev/null || true
          cp /tmp/db.json.zip .
          git add db.json.zip
          git commit -m "Update database for ${BRANCH}"
          git push origin "${DB_BRANCH}" --force
          git checkout "${BRANCH}"

  build-full:
    needs: [sync-master, sync-db9, sync-aitorgomez, sync-full]
    if: |
      always() && !cancelled() &&
      needs.sync-full.result == 'success' &&
      (
        needs.sync-master.outputs.has_release_changes == 'true' ||
        needs.sync-db9.outputs.has_release_changes == 'true' ||
        needs.sync-aitorgomez.outputs.has_release_changes == 'true' ||
        needs.sync-full.outputs.has_release_changes == 'true'
      )
    uses: ./.github/workflows/build-feature.yml
    with:
      branch: full
      release_name: >-
        ${{
          needs.sync-full.outputs.release_name ||
          needs.sync-db9.outputs.release_name ||
          needs.sync-aitorgomez.outputs.release_name ||
          needs.sync-master.outputs.release_name
        }}
    secrets: inherit
